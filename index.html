<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARK: Survival Ascended Atlas</title>
    <meta
      name="description"
      content="Solo progression hub cho ARK: Survival Ascended theo phong cách atlas cổ đại và điện ảnh."
    />
    <script>
      (function () {
        var host = window.location.hostname;
        if (host === "ark-ascended-atlas.web.app") {
          window.location.replace(
            "https://ark-ascended-atlas.firebaseapp.com" +
              window.location.pathname +
              window.location.search +
              window.location.hash
          );
        }
      })();
    </script>
    <link rel="canonical" href="https://ark-ascended-atlas.firebaseapp.com/" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <div class="atmosphere-layer atmosphere-layer-a"></div>
      <div class="atmosphere-layer atmosphere-layer-b"></div>
      <main id="app" class="app-root" tabindex="-1"></main>
    </div>

    <aside id="adminDrawer" class="admin-drawer" aria-hidden="true"></aside>
    <div id="modalRoot" class="modal-root" aria-live="polite"></div>
    <input
      id="imageFilePicker"
      type="file"
      accept="image/*"
      hidden
    />
    <input
      id="atlasStateFilePicker"
      type="file"
      accept="application/json"
      hidden
    />

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
